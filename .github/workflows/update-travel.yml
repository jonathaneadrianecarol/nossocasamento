name: Update travel options

# Temporalmente manual.
# Cuando se corrija el exceso de búsquedas en update_travel_data.py
# y se reduzca el consumo de créditos de SerpApi, volver a activar schedule.
on:
  workflow_dispatch:

jobs:
  update-travel-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run updater script
        env:
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
        run: |
          python -u scripts/update_travel_data.py

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/travel-options.json
          git diff --cached --quiet || git commit -m "Update travel options"
          git push
